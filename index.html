<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <title>Personlighetstest</title>

  <style>
    body {
      margin: 0;
      padding: 16px;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    input,
    button {
      font-size: 16px;
    }

    #resultImage {
      display: none;
      width: 100%;
      height: calc(100dvh - 120px);
      object-fit: contain;
    }
  </style>
</head>
<body>
  <label>
    Förnamn:
    <input id="firstName" type="text">
  </label>

  <br><br>

  <button onclick="runCheck()">tryck här för att få vad du förtjänar</button>

  <br><br>

  <img id="resultImage" src="" alt="">

  <script>
    function runCheck() {
      document.activeElement.blur();

      const firstName = document.getElementById("firstName").value.trim().toLowerCase();
      const resultImage = document.getElementById("resultImage");

      const specialNames = ["jimmy", "philip", "henrik", "johan", "alexander"];

      if (specialNames.includes(firstName)) {
        resultImage.src = "images/banan.jpg";
        resultImage.alt = "Specialbild";
      } else {
        resultImage.src = "images/annan.jpg";
        resultImage.alt = "Standardbild";
      }

      resultImage.style.display = "block";
    }
  </script>
</body>
</html>
