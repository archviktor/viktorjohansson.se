<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Name Check</title>
</head>
<body>
  <label>
    First name:
    <input id="firstName" type="text">
  </label>

  <br><br>

  <label>
    Last name:
    <input id="lastName" type="text">
  </label>

  <br><br>

  <button onclick="runCheck()">Run</button>

  <p id="result"></p>

  <script>
    function runCheck() {
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();

      const result =
        firstName === "Alexander" && lastName === "Hagerf"
          ? "Eftersom jag har uppmärksammat att du är Alexander Hagerf, kan jag konstatera att du är en bajskorv."
          : "Du är en normal människa.";

      document.getElementById("result").textContent = result;
    }
  </script>
</body>
</html>
