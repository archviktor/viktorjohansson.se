<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <title>Personlighetstest</title>
</head>
<body>
  <label>
    Förnamn:
    <input id="firstName" type="text">
  </label>

  <br><br>

  <button onclick="runCheck()">tryck här för att få vad du förtjänar</button>

  <br><br>

  <img id="resultImage" src="" alt="" style="display: none; max-width: 400px;">

  <script>
    function runCheck() {
      const firstName = document.getElementById("firstName").value.trim().toLowerCase();
      const resultImage = document.getElementById("resultImage");

      const specialNames = ["jimmy", "philip", "henrik", "johan"];

      if (specialNames.includes(firstName)) {
        resultImage.src = "images/banan.jpg";   // samma bild för alla dessa namn
        resultImage.alt = "Specialbild";
      } else {
        resultImage.src = "images/annan.jpg";
        resultImage.alt = "Standardbild";
      }

      resultImage.style.display = "block";
    }
  </script>
</body>
</html>
