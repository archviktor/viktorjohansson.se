<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Personlighetstest</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: sans-serif;
      background: black;
    }

    input, button {
      font-size: 16px;
    }

    #formPage {
      padding: 16px;
      box-sizing: border-box;
      background: white;
      min-height: 100dvh;
    }

    #imagePage {
      display: none;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: black;
    }

    #resultImage {
      width: 100vw;
      height: 100dvh;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <main id="formPage">
    <label>
      Förnamn:
      <input id="firstName" type="text" autocomplete="given-name">
    </label>

    <br><br>

    <button onclick="runCheck()">tryck här för att få vad du förtjänar</button>
  </main>

  <main id="imagePage">
    <img id="resultImage" src="" alt="">
  </main>

  <audio id="resultAudio" preload="auto"></audio>

  <script>
    function runCheck() {
      const firstNameInput = document.getElementById("firstName");
      const firstName = firstNameInput.value.trim().toLowerCase();

      const formPage = document.getElementById("formPage");
      const imagePage = document.getElementById("imagePage");
      const resultImage = document.getElementById("resultImage");
      const resultAudio = document.getElementById("resultAudio");

      const specialNames = ["jimmy", "philip", "henrik", "johan", "alexander"];

      firstNameInput.blur();
      formPage.style.display = "none";
      imagePage.style.display = "block";
      window.scrollTo(0, 0);

      resultAudio.pause();
      resultAudio.currentTime = 0;

      if (specialNames.includes(firstName)) {
        resultImage.src = "images/banan.gif?ts=" + Date.now();
        resultImage.alt = "Specialbild";

        resultAudio.src = "audio/banan.mp3";
        resultAudio.play().catch(() => {
          // Browser blocked playback despite user click.
        });
      } else {
        resultImage.src = "images/annan.jpg";
        resultImage.alt = "Standardbild";
        resultAudio.removeAttribute("src");
      }
    }
  </script>
</body>
</html>
