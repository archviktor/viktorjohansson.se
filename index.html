<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Personlighetstest</title>
</head>
<body>
  <label>
    First name:
    <input id="firstName" type="text">
  </label>

  <br><br>

  <label>
    Last name:
    <input id="lastName" type="text">
  </label>

  <br><br>

  <button onclick="runCheck()">Run</button>

  <p id="result"></p>

  <script>
    function runCheck() {
      const firstName = document.getElementById("firstName").value.trim().toLowerCase();
      const lastName = document.getElementById("lastName").value.trim().toLowerCase();

      const isAlexHagerf =
        (firstName === "alex" || firstName === "alexander") &&
        lastName === "hagerf";

      const result = isAlexHagerf
        ? "Du är snäll men bajsar på dig ibland"
        : "Du är normal";

      document.getElementById("result").textContent = result;
    }
  </script>
</body>
</html>
