<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Personlighetstest</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: sans-serif;
    }

    input,
    button {
      font-size: 16px;
    }

    #formPage {
      padding: 16px;
      box-sizing: border-box;
    }

    #imagePage {
      display: none;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: black;
    }

    #resultImage {
      width: 100vw;
      height: 100dvh;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <main id="formPage">
    <label>
      Förnamn:
      <input id="firstName" type="text" autocomplete="given-name">
    </label>

    <br><br>

    <button onclick="runCheck()">tryck här för att få vad du förtjänar</button>
  </main>

  <main id="imagePage">
    <img id="resultImage" src="" alt="">
  </main>

  <script>
    function runCheck() {
      const firstNameInput = document.getElementById("firstName");
      const firstName = firstNameInput.value.trim().toLowerCase();

      const formPage = document.getElementById("formPage");
      const imagePage = document.getElementById("imagePage");
      const resultImage = document.getElementById("resultImage");

      const specialNames = ["jimmy", "philip", "henrik", "johan", "alexander"];

      if (specialNames.includes(firstName)) {
        resultImage.src = "images/banan.jpg";
        resultImage.alt = "Specialbild";
      } else {
        resultImage.src = "images/annan.jpg";
        resultImage.alt = "Standardbild";
      }

      firstNameInput.blur();
      formPage.style.display = "none";
      imagePage.style.display = "block";
      window.scrollTo(0, 0);
    }
  </script>
</body>
</html>
