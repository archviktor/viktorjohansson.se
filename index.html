<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Personlighetstest</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: sans-serif;
      background: black;
    }

    input, button {
      font-size: 16px;
    }

    #formPage {
      padding: 16px;
      box-sizing: border-box;
      background: white;
      min-height: 100dvh;
    }

    #imagePage {
      display: none;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: black;
    }

    #resultImage {
      width: 100vw;
      height: 100dvh;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <main id="formPage">
    <label>
      Förnamn:
      <input id="firstName" type="text" autocomplete="given-name">
    </label>

    <br><br>

    <button onclick="runCheck()">tryck här för att få vad du förtjänar</button>
  </main>

  <main id="imagePage">
    <img id="resultImage" src="" alt="">
  </main>

  <audio id="resultAudio" preload="auto"></audio>

  <script>
    const ASSET_VERSION = "20260429-5";
    const GIF_DURATION_MS = 5200;
    let stopGifTimer = null;

    function versioned(path) {
      return path + "?v=" + encodeURIComponent(ASSET_VERSION) + "&t=" + Date.now();
    }

    function runCheck() {
      const firstNameInput = document.getElementById("firstName");
      const firstName = firstNameInput.value.trim().toLowerCase();

      const formPage = document.getElementById("formPage");
      const imagePage = document.getElementById("imagePage");
      const resultAudio = document.getElementById("resultAudio");

      const specialNames = ["jimmy", "philip", "henrik", "johan", "alexander"];

      if (stopGifTimer !== null) {
        clearTimeout(stopGifTimer);
        stopGifTimer = null;
      }

      firstNameInput.blur();
      formPage.style.display = "none";
      imagePage.style.display = "block";
      window.scrollTo(0, 0);

      resultAudio.pause();
      resultAudio.currentTime = 0;
      resultAudio.loop = false;
      resultAudio.preload = "auto";

      if (specialNames.includes(firstName)) {
        const oldImage = document.getElementById("resultImage");
        const newImage = document.createElement("img");

        newImage.id = "resultImage";
        newImage.alt = "Specialbild";

        newImage.onload = () => {
          stopGifTimer = setTimeout(() => {
            const currentImage = document.getElementById("resultImage");
            currentImage.src = versioned("images/banan-last-frame.jpg");
          }, GIF_DURATION_MS);
        };

        newImage.src = versioned("images/banan.gif");
        oldImage.replaceWith(newImage);

        resultAudio.src = versioned("audio/banan.mp3");
        resultAudio.load();
        resultAudio.play().catch(() => {});
      } else {
        const resultImage = document.getElementById("resultImage");
        resultImage.src = versioned("images/annan.jpg");
        resultImage.alt = "Standardbild";

        resultAudio.removeAttribute("src");
        resultAudio.load();
      }
    }
  </script>
</body>
</html>
